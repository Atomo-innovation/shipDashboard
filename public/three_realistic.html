        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // FXAA shader (inline, official)
        const FXAAShader = {
            uniforms: {
                'tDiffuse': { value: null },
                'resolution': { value: { x: 1 / 1024, y: 1 / 512 } }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                #define FXAA_REDUCE_MIN   (1.0/128.0)
                #define FXAA_REDUCE_MUL   (1.0/8.0)
                #define FXAA_SPAN_MAX     8.0
                uniform sampler2D tDiffuse;
                uniform vec2 resolution;
                varying vec2 vUv;
                void main() {
                    vec3 rgbNW = texture2D(tDiffuse, vUv + (vec2(-1.0, -1.0) * resolution)).xyz;
                    vec3 rgbNE = texture2D(tDiffuse, vUv + (vec2(1.0, -1.0) * resolution)).xyz;
                    vec3 rgbSW = texture2D(tDiffuse, vUv + (vec2(-1.0, 1.0) * resolution)).xyz;
                    vec3 rgbSE = texture2D(tDiffuse, vUv + (vec2(1.0, 1.0) * resolution)).xyz;
                    vec3 rgbM  = texture2D(tDiffuse, vUv).xyz;
                    vec3 luma = vec3(0.299, 0.587, 0.114);
                    float lumaNW = dot(rgbNW, luma);
                    float lumaNE = dot(rgbNE, luma);
                    float lumaSW = dot(rgbSW, luma);
                    float lumaSE = dot(rgbSE, luma);
                    float lumaM  = dot(rgbM,  luma);
                    float lumaMin = min(lumaM, min(min(lumaNW, lumaNE), min(lumaSW, lumaSE)));
                    float lumaMax = max(lumaM, max(max(lumaNW, lumaNE), max(lumaSW, lumaSE)));
                    vec2 dir;
                    dir.x = -((lumaNW + lumaNE) - (lumaSW + lumaSE));
                    dir.y =  ((lumaNW + lumaSW) - (lumaNE + lumaSE));
                    float dirReduce = max((lumaNW + lumaNE + lumaSW + lumaSE) * (0.25 * FXAA_REDUCE_MUL), FXAA_REDUCE_MIN);
                    float rcpDirMin = 1.0 / (min(abs(dir.x), abs(dir.y)) + dirReduce);
                    dir = min(vec2(FXAA_SPAN_MAX, FXAA_SPAN_MAX),
                              max(vec2(-FXAA_SPAN_MAX, -FXAA_SPAN_MAX), dir * rcpDirMin)) * resolution;
                    vec3 rgbA = 0.5 * (
                        texture2D(tDiffuse, vUv + dir * (1.0 / 3.0 - 0.5)).xyz +
                        texture2D(tDiffuse, vUv + dir * (2.0 / 3.0 - 0.5)).xyz);
                    vec3 rgbB = rgbA * 0.5 + 0.25 * (
                        texture2D(tDiffuse, vUv + dir * -0.5).xyz +
                        texture2D(tDiffuse, vUv + dir * 0.5).xyz);
                    float lumaB = dot(rgbB, luma);
                    if ((lumaB < lumaMin) || (lumaB > lumaMax)) {
                        gl_FragColor = vec4(rgbA, 1.0);
                    } else {
                        gl_FragColor = vec4(rgbB, 1.0);
                    }
                }
            `
        };

            // 📡 STREAM FUNCTION WITH PROPER ERROR HANDLING
let currentStreamUrl = null;
let videoModal = null;

function startShipStream() {

    if (currentStreamUrl) {
        console.log('Stream already running, reopening modal...');
        openStream(currentStreamUrl);
        return;
    }

    // ✅ No loading screen - instant open

    fetch('/api/start-stream', {

            // NEW: Open HLS Video Modal (like office "Live Stream")
            function openStream(streamUrl) {
                // Create modal if not exists
                if (!videoModal) {
                    videoModal = document.createElement('div');
                    videoModal.style.cssText = `
                        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                        background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(20,30,50,0.95)); 
                        z-index: 10000;
                        display: flex; align-items: center; justify-content: center;
                        backdrop-filter: blur(20px);
                        animation: fadeIn 0.3s ease;
                    `;
                    const video = document.createElement('video');
                    video.id = 'shipStreamVideo';
                    video.style.cssText = `
                        width: 90%; height: 90%; max-width: 1920px; max-height: 1080px;
                        background: #000; border-radius: 20px; box-shadow: 0 25px 100px rgba(0,0,0,0.8);
                        border: 2px solid rgba(74, 158, 255, 0.3);
                    `;
                    video.controls = true;
                    video.autoplay = true;
                    const closeBtn = document.createElement('button');
                    closeBtn.textContent = 'Close';
                    closeBtn.style.cssText = `
                        position: absolute; top: 30px; right: 30px; z-index: 10001; 
                        padding: 15px 30px; background: linear-gradient(135deg, #ff4444, #cc0000); 
                        color: white; border: 2px solid rgba(255,255,255,0.2); border-radius: 50px; 
                        cursor: pointer; font-size: 16px; font-weight: 700; text-transform: uppercase;
                        box-shadow: 0 10px 30px rgba(255,0,0,0.4);
                        transition: all 0.3s ease; letter-spacing: 1px;
                    `;
                    closeBtn.onmouseover = () => {
                        closeBtn.style.transform = 'scale(1.1) translateY(-2px)';
                        closeBtn.style.boxShadow = '0 15px 40px rgba(255,0,0,0.6)';
                    };
                    closeBtn.onmouseout = () => {
                        closeBtn.style.transform = 'scale(1) translateY(0)';
                        closeBtn.style.boxShadow = '0 10px 30px rgba(255,0,0,0.4)';
                    };
                    closeBtn.onclick = () => {
                        const vid = document.getElementById('shipStreamVideo');
                        if (vid) vid.pause();
                        if (videoModal && videoModal.parentNode) {
                            document.body.removeChild(videoModal);
                        }
                        videoModal = null;
                        // Optional: Stop stream after 10s idle
                        setTimeout(() => {
                            if (currentStreamUrl) {
                                const streamId = currentStreamUrl.split('/')[3]; // e.g., 'ship_camera_123'
                                fetch('/api/stop-stream', { 
                                    method: 'POST', 
                                    body: JSON.stringify({ streamId: streamId }), 
                                    headers: { 'Content-Type': 'application/json' }
                                }).catch(err => console.error('Stop stream error:', err));
                            }
                        }, 10000);
                    };
                    videoModal.appendChild(video);
                    videoModal.appendChild(closeBtn);
                    document.body.appendChild(videoModal);
                }

                // Play with hls.js
                const video = document.getElementById('shipStreamVideo');
                if (Hls.isSupported()) {
                    if (video.hls) video.hls.destroy();
                    const hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backBufferLength: 10,
                        maxBufferLength: 10,
                        maxMaxBufferLength: 20,
                        liveSyncDuration: 1,
                        liveMaxLatencyDuration: 3,
                        highBufferWatchdogPeriod: 1
                    });
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(err => console.error('Play error:', err));
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', () => {
                        video.play().catch(err => console.error('Play error:', err));
                    });
                }
            }
        }

        function createRealisticCargoShip() {
            ship = new THREE.Group();
            ship.position.y = 0;
            ship.scale.set(1.8, 1.8, 1.8);  // Ship ko 1.8x bada kar diya

            // REALISTIC WEATHERED MATERIALS (Brightened for visibility)
            const weatheredHullMat = new THREE.MeshStandardMaterial({
                color: 0x3a4550,  // Brighter gray-blue
                metalness: 0.5,
                roughness: 0.85,
                emissive: 0x1a2530,  // Subtle blue glow

            });

            const rustHullMat = new THREE.MeshStandardMaterial({
                color: 0x2a3238,  // Lighter dark gray

                roughness: 0.88,
                emissive: 0x0f1820,

                metalness: 0.4,

            });

            const waterlineMat = new THREE.MeshStandardMaterial({
                color: 0x9aabb8,  // Bright waterline stripe
                metalness: 0.4,
                roughness: 0.75
            });

            const bridgeMat = new THREE.MeshStandardMaterial({
                color: 0xbcc5d0,
                metalness: 0.35,
                roughness: 0.8
            });

            const railingMat = new THREE.MeshStandardMaterial({
                color: 0x1a1f24,
                metalness: 0.6,
                roughness: 0.7
            });

            // ========== HULL - REALISTIC WEATHERED ==========
            
            // Main Hull Body (WIDER + GOOD HEIGHT)
            const hullGeo = new THREE.BoxGeometry(180, 32, 32);
            const hull = new THREE.Mesh(hullGeo, weatheredHullMat);
            hull.position.y = 3;
            hull.castShadow = true;
            hull.receiveShadow = true;
            ship.add(hull);

            // Hull Underwater Section (darker, rust)
            const hullBottomGeo = new THREE.BoxGeometry(179, 14, 31.5);
            const hullBottom = new THREE.Mesh(hullBottomGeo, rustHullMat);
            hullBottom.position.y = -17;
            hullBottom.castShadow = true;
            ship.add(hullBottom);

            // Waterline Stripe (light gray/white)
            const waterlineGeo = new THREE.BoxGeometry(181, 1.5, 32.5);
            const waterline = new THREE.Mesh(waterlineGeo, waterlineMat);
            waterline.position.y = -7;
            ship.add(waterline);

            // BOW - SMOOTH SHARP V-SHAPE
            
            // Upper bow (above waterline) - smooth gradual taper
            for (let i = 0; i < 27; i++) {
                const width = 32 - i * 0.8;  // Smooth narrowing (27 sections)
                if (width < 0.4) break;
                const xPos = 78 + i * 1.3;  // 1.3m slices for balanced smoothness
                
                // Upper hull section (thin slices for smooth curve)
                const upperGeo = new THREE.BoxGeometry(1.3, 22, width);
                const upper = new THREE.Mesh(upperGeo, weatheredHullMat);
                upper.position.set(xPos, 8, 0);
                upper.castShadow = true;
                ship.add(upper);
            }
            
            // Underwater bow (SMOOTH SHARP V-shape below waterline)
            for (let i = 0; i < 27; i++) {
                const width = 31 - i * 1.1;  // Sharp but smooth V underwater
                if (width < 0.2) break;
                
                const xPos = 78 + i * 1.3;  // 1.3m slices for smoothness
                
                // Underwater V-section (thin for smooth curve)
                const underGeo = new THREE.BoxGeometry(1.3, 14, width);
                const under = new THREE.Mesh(underGeo, rustHullMat);
                under.position.set(xPos, -10, 0);
                under.castShadow = true;
                ship.add(under);
            }
            
            // Bow tip (sharp point)
            const tipGeo = new THREE.ConeGeometry(0.5, 7, 8);
            const tip = new THREE.Mesh(tipGeo, weatheredHullMat);
            tip.rotation.z = -Math.PI / 2;
            tip.position.set(110, 8, 0);
            tip.castShadow = true;
            ship.add(tip);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // Adaptive Performance Monitor
            performanceMonitor.frameCount++;
            if (performanceMonitor.frameCount % performanceMonitor.checkInterval === 0) {
                const currentTime = performance.now();
                const deltaTime = currentTime - performanceMonitor.lastTime;
                performanceMonitor.fps = Math.round(1000 * performanceMonitor.checkInterval / deltaTime);
                performanceMonitor.lastTime = currentTime;

                // Quality locked at HIGH - no FPS overlay
            }

            // Water animation
            if (water) {
                water.material.uniforms['time'].value = time * 0.4;
            }

            // Enhanced ship motion (smooth and realistic)
            if (ship) {
                // Target values for smooth ship motion
                const targetX = Math.sin(time * 0.25) * 0.006;
                const targetZ = Math.sin(time * 0.3) * 0.008;
                const targetY = Math.sin(time * 0.4) * 0.5 + Math.cos(time * 0.25) * 0.3;

                // Lerp (interpolate) for ultra-smooth motion
                ship.rotation.x += (targetX - ship.rotation.x) * 0.08;
                ship.rotation.z += (targetZ - ship.rotation.z) * 0.08;
                ship.position.y += (targetY - ship.position.y) * 0.08;

                // Optimized blinking navigation lights + camera LED
                if (performanceMonitor.frameCount % 10 === 0) {
                    const blinkSpeed = Math.sin(time * 3) > 0 ? 1 : 0.3;
                    ship.traverse((obj) => {
                        if (obj.isPointLight && obj.userData.baseIntensity) {
                            obj.intensity = obj.userData.baseIntensity * blinkSpeed;
                        }
                        // Camera LED blink (slower)
                        if (obj.userData.recordingLED) {
                            const led = obj.userData.recordingLED;
                            led.material.emissiveIntensity = Math.sin(time * 2) > 0 ? 1.5 : 0.5;
                        }
                    });
                }
            }

            controls.update();
            
            // Use composer for visual effects (adaptive quality)
            composer.render();
        }

        // Embed mode for dashboard iframe
        if (new URLSearchParams(location.search).has('embed')) {
            document.body.classList.add('embed-mode');
        }

        window.addEventListener('message', (event) => {
            const view = event?.data?.view;
            if (view === 'exterior' && typeof viewExterior === 'function') viewExterior();
            if (view === 'engine' && typeof viewEngineRoom === 'function') viewEngineRoom();
            if (view === 'cabin' && typeof viewCaptainCabin === 'function') viewCaptainCabin();
            if (view === 'mess' && typeof viewMessHall === 'function') viewMessHall();
            if (view === 'deck' && typeof viewExterior === 'function') {
                camera.position.set(0, 220, 40);
                controls.target.set(0, 20, 0);
                controls.minDistance = 80;
                controls.maxDistance = 350;
                controls.maxPolarAngle = Math.PI / 2.05;

            }
        });

        // NEW: Cleanup on window unload (stop stream if active)
        window.addEventListener('beforeunload', () => {
            if (currentStreamUrl) {
                const streamId = currentStreamUrl.split('/')[3]; // e.g., 'ship_camera_123'

                    method: 'POST', 
                    body: JSON.stringify({ streamId: streamId }), 
                    headers: { 'Content-Type': 'application/json' }
                }).catch(err => console.error('Cleanup stream error:', err));
            }
        });
